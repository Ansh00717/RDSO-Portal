<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Updated — RDSO Portal</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}?v=6">
</head>
  <body>
    <!-- Overlay ambient particle background elements -->
    <div class="ambient-glow">
      <div class="glow-1"></div>
      <div class="glow-2"></div>
    </div>

    <!-- Success message wrapper -->
    <div class="app-wrapper">
      <div class="card-outlet" style="text-align: center; padding: 48px 40px;">
        
        <!-- Success checkmark icon -->
        <div class="success-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>

        <h2 class="success-title">Password Updated Successfully</h2>

        <p class="success-subtitle">
          Your password has been changed. You can now sign in with your new password.
        </p>

        <a href="{% url 'home' %}" class="action-submit-btn" style="display: inline-flex; text-decoration: none; max-width: 260px; margin: 24px auto 0;">
          <span class="btn-text">Go To Login</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </body>
</html>
