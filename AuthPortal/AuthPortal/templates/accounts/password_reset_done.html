<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent — RDSO Portal</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}?v=6">
</head>
  <body>
    <!-- Overlay ambient particle background elements -->
    <div class="ambient-glow">
      <div class="glow-1"></div>
      <div class="glow-2"></div>
    </div>

    <!-- Success message wrapper -->
    <div class="app-wrapper">
      <div class="card-outlet" style="text-align: center; padding: 48px 40px;">
        
        <!-- Mail Checkmark icon -->
        <div class="success-icon-wrap" style="color: #3b82f6; background-color: #eff6ff;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="m16 19 2 2 4-4"/>
          </svg>
        </div>

        <h2 class="success-title">Reset Link Sent</h2>

        <p class="success-subtitle">
          If an account exists with that email address, we have sent a password reset link.<br><br>
          Please check your inbox and spam folder.
        </p>

        <a href="{% url 'home' %}" class="action-submit-btn" style="display: inline-flex; text-decoration: none; max-width: 260px; margin: 24px auto 0;">
          <span class="btn-text">Return to Sign In</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
      </div>
    </div>
  </body>
</html>
