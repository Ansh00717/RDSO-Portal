<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your RDSO Portal Password</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f1f5f9; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06);">

          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); padding: 32px 40px; text-align: center;">
              <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">
                RDSO Portal
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px;">

              <p style="margin: 0 0 20px; font-size: 16px; color: #1e293b; line-height: 1.6;">
                Hello,
              </p>

              <p style="margin: 0 0 24px; font-size: 15px; color: #475569; line-height: 1.6;">
                We received a request to reset your password.
              </p>
              
              <p style="margin: 0 0 32px; font-size: 15px; color: #475569; line-height: 1.6;">
                Click the button below to create a new password.
              </p>

              <!-- Reset Button -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom: 32px;">
                <tr>
                  <td align="center">
                    <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="
                      display: inline-block;
                      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
                      color: #ffffff;
                      font-size: 15px;
                      font-weight: 700;
                      text-decoration: none;
                      padding: 14px 36px;
                      border-radius: 10px;
                      letter-spacing: 0.3px;
                    ">Reset Password</a>
                  </td>
                </tr>
              </table>

              <p style="margin: 0; font-size: 13px; color: #94a3b8; line-height: 1.5;">
                If you did not request this, please ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 24px 40px; text-align: center;">
              <p style="margin: 0; font-size: 13px; color: #94a3b8; line-height: 1.5;">
                Regards,<br>
                <strong style="color: #64748b;">RDSO Portal Team</strong>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
